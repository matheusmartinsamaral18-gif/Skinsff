<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATIVAR SKINS | @THEUSSYT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1>ATIVAR SKINS</h1>
            <div class="signature">Desenvolvido por <strong style="color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);">@THEUSSYT</strong></div>
        </div>
        
        <div class="card shadow-glow">
            <div class="alert-title">⚠️ ATENÇÃO REQUISITOS</div>
            <div class="desc-list">
                <div class="desc-item" style="border-bottom: 1px solid #232d4b; padding-bottom: 12px; margin-bottom: 4px;">
                    <span class="bullet">📦</span> 
                    <span>O seu arquivo <strong>.ZIP</strong> deve conter obrigatoriamente estes 3 arquivos:<br>
                    • <code style="color: #60a5fa;">ProjectData_slot_X.bytes</code><br>
                    • <code style="color: #60a5fa;">ProjectData_slot_X.meta</code><br>
                    • <code style="color: #60a5fa;">UserLevelData_X.bytes</code>
                    </span>
                </div>
            </div>
        </div>

        <div class="input-section">
            <label for="zipInput">📂 Selecione o Arquivo ZIP do Mapa</label>
            <input type="file" id="zipInput" accept=".zip">
        </div>

        <div id="uidContainer"></div>

        <div class="action-section">
            <button id="patchBtn" disabled>⚡ ATIVAR SKINS & BAIXAR MAPA</button>
        </div>

        <!-- Modal de Logs -->
        <div id="logsModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 9999;">
            <div class="modal-content" style="background: #0f172a; padding: 25px; width: 90%; max-width: 500px; border-radius: 12px; border: 1px solid #f59e0b; color: white; text-align: center;">
                <div class="log-title">🖥️ Console de Operações</div>
                <div style="font-size: 12px; color: #f59e0b; margin-bottom: 10px; font-weight: bold;">SISTEMA OPERADO POR @THEUSSYT</div>
                <div class="log" id="log" style="margin: 15px 0; max-height: 300px; overflow-y: auto; text-align: left; font-size: 14px; color: #cbd5e1;"></div>
                <button class="close-btn" onclick="document.getElementById('logsModal').style.display='none'" style="margin-top: 15px; padding: 8px 20px; background: #f59e0b; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">FECHAR</button>
            </div>
        </div>

        <div class="footer-section" style="display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 20px;">
            <a href="https://www.tiktok.com/@theussyt" target="_blank" class="tiktok-btn">MEU TIKTOK OFICIAL</a>
            <div class="welcome-msg">Modo de Criação FF</div>
        </div>
    </div>
    
    <script src="spark-md5.min.js"></script>
    <script src="jszip.min.js"></script>
    <script src="server.js"></script>
    <script>
        document.getElementById('patchBtn').addEventListener('click', function() {
            document.getElementById('logsModal').style.display = 'flex';
        });
    </script>
</body>
</html>
